detailedDescription: "This certificate of excellence recognizes successful completion of the workshop 'Basics of PyTorch Programming' conducted by the IIT Madras BS Degree Program. The workshop covered core concepts of deep learning using PyTorch, including tensors, neural network construction, training workflows, and practical implementation. The program was conducted from February 1 to February 4, 2026."