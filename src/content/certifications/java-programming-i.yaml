detailedDescription: "Java Programming I is part of the University of Helsinki’s Java Programming MOOC, focusing on core programming concepts using Java. The course covers variables, control structures, methods, and object-oriented programming fundamentals, along with hands-on problem solving. It is equivalent to 5 ECTS credits for University of Helsinki students."