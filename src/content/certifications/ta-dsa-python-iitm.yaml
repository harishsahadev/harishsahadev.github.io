detailedDescription: "Worked as a Teaching Assistant (Intern) for Programming, Data Structures and Algorithms using Python (PDSA), a diploma-level (2nd year) course in the IIT Madras B.S. Degree Program. Conducted interactive online coding sessions covering data structures such as arrays, linked lists, trees, and heaps, along with algorithms including greedy methods, divide and conquer, dynamic programming, sorting, and searching techniques. Actively assisted students in problem-solving and reinforced core algorithmic concepts."