<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon glow effect -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#050505" stroke="#ffffff" stroke-width="10"></rect>

  <!-- Neon H -->
  <g stroke="#00eaff" stroke-width="18" stroke-linecap="round" filter="url(#neonGlow)" fill="none">
    <!-- Left pillar -->
    <line x1="170" y1="140" x2="170" y2="372"></line>
    
    <!-- Right pillar -->
    <line x1="342" y1="140" x2="342" y2="372"></line>
    
    <!-- Crossbar -->
    <line x1="170" y1="256" x2="342" y2="256"></line>
  </g>

  <!-- Inner sharp H (core for clarity at small sizes) -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <line x1="170" y1="140" x2="170" y2="372"></line>
    <line x1="342" y1="140" x2="342" y2="372"></line>
    <line x1="170" y1="256" x2="342" y2="256"></line>
  </g>
</svg>